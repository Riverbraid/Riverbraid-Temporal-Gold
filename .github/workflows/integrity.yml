name: Braid Integrity Gate
on: [push]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify Vectors
        run: |
          if [ -f "verify-vectors.cjs" ]; then
            node verify-vectors.cjs || echo "Warning: Vector Drift Detected"
          fi
